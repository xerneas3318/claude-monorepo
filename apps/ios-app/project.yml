name: ClaudePlanner
options:
  bundleIdPrefix: com.xerneas
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.0

configFiles:
  Debug: Config.local.xcconfig
  Release: Config.local.xcconfig

targets:
  ClaudePlanner:
    type: application
    platform: iOS
    configFiles:
      Debug: Config.local.xcconfig
      Release: Config.local.xcconfig
    sources:
      - path: ClaudePlanner
        excludes:
          - "GoogleService-Info.plist.example"
    resources:
      - path: ClaudePlanner/GoogleService-Info.plist
        optional: true
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: MarkdownUI
        product: MarkdownUI
    info:
      path: ClaudePlanner/Info.plist
      properties:
        CFBundleDisplayName: ClaudePlanner
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes: []
        NSMicrophoneUsageDescription: ClaudePlanner needs the microphone to capture what you say to Claude.
        NSSpeechRecognitionUsageDescription: ClaudePlanner transcribes your speech on-device so you can talk to Claude hands-free.
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - claudeplanner
        # Relay base URL. The actual value is injected from
        # ios-app/Config.local.xcconfig (gitignored). See the .example file.
        RelayBaseURL: $(RELAY_BASE_URL)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xerneas.claudeplanner
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: ClaudePlanner/ClaudePlanner.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_ASSET_PATHS: "\"ClaudePlanner/Preview Content\""
        ENABLE_PREVIEWS: YES
